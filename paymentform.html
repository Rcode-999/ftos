<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Truck Ordering Service</title>
    <link rel="stylesheet" href="paymentform.css" />
    <link rel="script" href="script.javascript" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
   
</head>

<body>
    <div class="container">
        <form action="#">
            <div class="row">
                <div class="col">
                    <h3 class="title">Billing address</h3>
                    <div class="inputBox">
                        <span>Full Name: </span>
                        <input type="text" placeholder="John Deo">
                    </div>
                    <div class="inputBox">
                        <span>Email: </span>
                        <input type="email" placeholder="example@example.com">
                    </div>
                    <div class="inputBox">
                        <span>Address: </span>
                        <input type="text" placeholder="Street">
                    </div>
                    <div class="inputBox">
                        <span>City: </span>
                        <input type="text" placeholder="Gqberha">
                    </div>
                    <div class="flex">
                        <div class="inputBox">
                            <span>State: </span>
                            <input type="text" placeholder="South Africa">
                        </div>
                        <div class="inputBox">
                            <span>Zip: </span>
                            <input type="text" placeholder="123 456">
                        </div>
                    </div>
                </div>
                <div class="col">
                    <h3 class="title">Payment</h3>
                    <div class="inputBox">
                        <span>Cards accepted: </span>
                        <img src="img/accepted_cards.png">
                    </div>
                    <div class="inputBox">
                        <span>Name on card: </span>
                        <input type="text" placeholder="mr. john deo">
                    </div>
                    <div class="inputBox">
                        <span>Card number: </span>
                        <input type="number" placeholder="1111-2222-3333-4444">
                    </div>
                    <div class="inputBox">
                        <span>Exp month: </span>
                        <input type="text" placeholder="january">
                    </div>
                    <div class="flex">
                        <div class="inputBox">
                            <span>Exp year: </span>
                            <input type="number" placeholder="1980">
                        </div>
                        <div class="inputBox">
                            <span>CVV: </span>
                            <input type="text" placeholder="000">
                        </div>
                    </div>
                </div>
            </div>
            <input type="submit" value="proceed to checkout" class="submit-btn">
        </form>
    </div>
</body>
</html>
