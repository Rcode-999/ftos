<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <section class="container forms">
        <div class="form login">
            <div class="form-content">
                <header>Login</header>

                <form action="#" >
                    <div class="field input-field">
                        <input type="email"  placeholder="Email" class="input">
                    </div>
                    <div class="field input-field">
                        <input type="password"  placeholder="Password" class="password">
                        <i class='bx bx-hide eye-icon'></i>
                    </div>
                    <div class="form-link">
                        <a href="#" class="forgot-password">Forgot password</a>                        

                    </div>
                    <div class="field button-field">
                        <button>Login</button>
                    </div>
                    <div class="form-link">
                        <span>Already have an account? <a href="#" class="link signup-link">Signup</a></span>
                    </div>
                </form>
            </div>
        </div>
        <!--Signup Form-->

        <div class="form signup">
            <div class="form-content">
                <header>Signup</header>

                <form action="login.php" method="post">
                    <div class="field email-field">
                        <input type="email" id="email" placeholder="Email" class="input" name="email">
                        <span class="error email-error">
                            <i class='bx bx-error-circle error-icon'></i>
                            <p class="error-text">Please enter a valid email</p>
                        </span>
                        
                    </div>
                    <div class="field input-field">
                        <input type="password" id="password" placeholder="Create password" class="password" name="pass">
                        <i class='bx bx-hide eye-icon'></i>
                        <span class="error password-error">
                            <i class='bx bx-error-circle error-icon'></i>
                            <p class="error-text">Please enter atleast 8 characters with number, symbol, small and capital letters</p>
                        </span>
                    </div>
                    <div class="field input-field">
                        <input type="password" id="cpassword" placeholder="Confirm password" class="cpassword" name="cpass">
                        <i class='bx bx-hide eye-icon'></i>
                        <span class="error cPpassword-err0r">
                            <i class='bx bx-error-circle error-icon'></i>
                            <p class="error-text">Password does not match</p>
                        </span>
                    </div>
                    
                    <div class="field button-field">
                        <button type="submit" onclick="">Signup</button>
                    </div>
                    <div class="form-link">
                        <span>Already have an account? <a href="#" class="link login-link">Login</a></span>
                    </div>
                </form>
            </div>
        </div>
    </section>
    <script src="login.js">
       
    </script>

    
</body>

</html>
